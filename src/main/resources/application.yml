server:
  port: 8080

spring:
  application:
    name: cold-email-bot

  # --- Database ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- Mail (Gmail SMTP) ---
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:email_removed}
    password: ${SMTP_PASSWORD:SMTP_PASSWORD_REMOVED}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# --- Telegram Bot ---
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:TELEGRAM_TOKEN_REMOVED}
    username: ${TELEGRAM_BOT_USERNAME:tanay_cold_email_bot}

