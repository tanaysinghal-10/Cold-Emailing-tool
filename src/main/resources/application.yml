# --- Resume ---
resume:
  mode: ${RESUME_MODE:MODE_A}
  static-path: ${RESUME_STATIC_PATH:resumes/Tanay_Singhal_Resume.pdf}

# --- Email Rate Limiting ---
email:
  daily-limit: ${EMAIL_DAILY_LIMIT:10}
  from:
    address: ${SMTP_FROM_EMAIL:email_removed}
    name: ${SMTP_FROM_NAME:Tanay Singhal}

# --- API Security ---
api:
  security:
    key: ${API_KEY:dev-api-key-change-me}

# --- Async ---
async:
  core-pool-size: 2
  max-pool-size: 5
  queue-capacity: 25

# --- Scraping ---
scraping:
  timeout-ms: 30000
  max-retries: 3
  headless: true

logging:
  level:
    com.coldbot: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
